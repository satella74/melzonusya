<script>
        let moves = 14;

        function addMove() {
            moves++;
            document.getElementById('move-count').innerText = moves;
        }

        function showWinModal() {
            addMove();
            addMove(); // Just to show game end
            const modal = document.getElementById('win-modal');
            document.getElementById('final-move-count').innerText = moves;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            createConfetti();
        }

        function hideWinModal() {
            const modal = document.getElementById('win-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('confetti-holder').innerHTML = '';
            moves = 0;
            document.getElementById('move-count').innerText = moves;
        }

        function createConfetti() {
            const container = document.getElementById('confetti-holder');
            const colors = ['#7bc9ff', '#fd8c9c', '#c9e6ff', '#ffd9dc', '#ffb2bb'];
            for(let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.opacity = Math.random();
                container.appendChild(confetti);
            }
        }
    </script>
